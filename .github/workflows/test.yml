# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "jyothi" ]
  pull_request:
    branches: [ "jyothi" ]

jobs:
  ios-tests:
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm install -g appium && appium driver install xcuitest
    - run: npx expo prebuild --platform ios
    - run: xcrun simctl boot "iPhone 15 Pro" || true
    - run: xcodebuild -workspace ios/mobiletestengtakehome.xcworkspace -scheme mobiletestengtakehome -configuration Release -sdk iphonesimulator -derivedDataPath ios/build
    - run: npm run test:ios-ci

  android-tests:
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm install -g appium && appium driver install uiautomator2
    - run: npx expo prebuild --platform android
    - run: cd android && ./gradlew assembleRelease && cd ..
    - name: Kill existing emulator instances (if any)
      run: |
          adb devices | grep emulator | cut -f1 | while read line; do adb -s $line emu kill; done || true
    - name: Create and Boot Android Emulator explicitly
      run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-33;google_apis;arm64-v8a"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd --force --name TestEmulator --abi google_apis/arm64-v8a --package 'system-images;android-33;google_apis;arm64-v8a'
          $ANDROID_HOME/emulator/emulator -avd TestEmulator -no-window -no-audio -gpu swiftshader_indirect -accel-check &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          boot_completed=""
          until [[ "$boot_completed" == "1" ]]; do
            sleep 5
            boot_completed=$($ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed | tr -d '\r')
            echo "Waiting for emulator boot to complete..."
          done
          echo "Emulator booted successfully!"
    - run: npm run test:android-ci
